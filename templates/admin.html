<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Master Admin Panel</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .admin-card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        
        /* Tab Styling */
        .tabs { display: flex; background: #eee; border-radius: 8px; margin-bottom: 20px; padding: 5px; }
        .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; background: none; font-weight: bold; transition: 0.3s; border-radius: 6px; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Form Styling */
        .form-section { display: none; }
        .form-section.active { display: block; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 80px; resize: vertical; }
        
        button.submit-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .staff-btn { background: var(--primary); }
        .marks-btn { background: var(--success); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #msg { text-align: center; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>🏫 Master Admin</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('staffSection', this)">Staff Entry</button>
        <button class="tab-btn" onclick="showTab('marksSection', this)">Marks Entry</button>
    </div>

    <div id="staffSection" class="form-section active">
        <form id="staffForm">
            <input type="hidden" name="sheet_type" value="StaffData">
            <input type="text" name="name" placeholder="शिक्षक का नाम (Name)" required>
            <input type="text" name="post" placeholder="पद (Post - e.g. PGT Math)" required>
            <input type="text" name="exp" placeholder="अनुभव (Experience)">
            <input type="text" name="qual" placeholder="योग्यता (Qualification)">
            <input type="text" name="sub" placeholder="विषय (Subject)">
            <input type="text" name="photo_url" placeholder="फोटो लिंक (Photo URL)">
            <input type="text" name="mobile" placeholder="मोबाइल नंबर">
            <textarea name="bio" placeholder="शिक्षक के बारे में कुछ शब्द..."></textarea>
            <button type="submit" class="submit-btn staff-btn">Add Teacher to Staff List</button>
        </form>
    </div>

    <div id="marksSection" class="form-section">
        <form id="marksForm">
            <input type="hidden" name="sheet_type" value="MarksData">
            <input type="text" name="roll" placeholder="Roll Number" required>
            <input type="text" name="sname" placeholder="Student Name" required>
            <input type="text" name="sclass" placeholder="Class (e.g. 10th-A)">
            <input type="text" name="smarks" placeholder="Marks Obtained (e.g. 450/500)">
            <select name="sresult">
                <option value="PASS">PASS</option>
                <option value="FAIL">FAIL</option>
                <option value="PENDING">PENDING</option>
            </select>
            <button type="submit" class="submit-btn marks-btn">Save Student Marks</button>
        </form>
    </div>

    <div id="msg"></div>
</div>

<script>
    // --- यहाँ अपना नया Apps Script Web App URL डालें ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz8OTDNDTc0gAXXJxZePtU4MVrWl5zC2-91oA8rOIdLv3TgaNht3WL1HrTdhnUf7_by/exec';

    // Tab Switch करने का फंक्शन
    function showTab(id, btn) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        document.getElementById('msg').style.display = 'none';
    }

    // दोनों Forms को Handle करने का कॉमन कोड
    const forms = [document.getElementById('staffForm'), document.getElementById('marksForm')];
    
    forms.forEach(form => {
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = form.querySelector('button');
            const msg = document.getElementById('msg');

            btn.disabled = true;
            msg.style.display = 'block';
            msg.style.background = '#e1f5fe';
            msg.style.color = '#0288d1';
            msg.innerText = "Processing... Please wait.";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.style.background = '#e8f5e9';
                msg.style.color = '#2e7d32';
                msg.innerText = "✅ Success! Data added to Google Sheet.";
                form.reset();
                btn.disabled = false;
            })
            .catch(error => {
                msg.style.background = '#ffebee';
                msg.style.color = '#c62828';
                msg.innerText = "❌ Error! Something went wrong.";
                btn.disabled = false;
                console.error('Error!', error.message);
            });
        });
    });
</script>

</body>
</html>
