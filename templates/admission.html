<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form - Govt HSS Alot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #f4f7f6; font-family: 'Arial', sans-serif; padding: 15px; margin: 0; }
        .form-container { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 🛠️ Header Flexbox: यह टाइटल और फोटो को एक लाइन में रखेगा बिना लेआउट बिगाड़े */
        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #003366;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .title-area h2 { color: #003366; margin: 0; font-size: 24px; }
        .title-area p { color: #666; margin: 5px 0 0 0; font-size: 14px; }

        /* 📸 Passport Size Photo (Right Side) */
        .photo-upload-wrapper {
            flex-shrink: 0; /* फोटो को दबने से रोकता है */
            text-align: center;
        }

        .photo-box {
            width: 100px;  /* परफेक्ट पासपोर्ट साइज चौड़ाई */
            height: 125px; /* परफेक्ट पासपोर्ट साइज लंबाई */
            border: 2px dashed #003366;
            background: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        #photoPreview { width: 100%; height: 100%; object-fit: cover; }
        .upload-hint { font-size: 9px; font-weight: bold; color: #003366; margin-top: 5px; display: block; }

        /* Form Content */
        .section-title { background: #f0f4f8; padding: 10px; margin: 20px 0 10px 0; color: #003366; border-left: 5px solid #003366; font-weight: bold; font-size: 15px; }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        label { font-size: 13px; font-weight: bold; color: #444; margin-bottom: 5px; display: block; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .submit-btn { width: 100%; background: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .form-header { flex-direction: column-reverse; align-items: center; text-align: center; }
            .title-area { margin-top: 15px; }
            .grid-input { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <form action="/payment-gate" method="POST" enctype="multipart/form-data">
            
            <div class="form-header">
                <div class="title-area">
                    <h2>Admission Form</h2>
                    <p>Govt HSS Alot | Session 2026-27</p>
                </div>

                <div class="photo-upload-wrapper">
                    <div class="photo-box" onclick="document.getElementById('photoUpload').click();">
                        <img id="photoPreview" src="https://via.placeholder.com/100x125?text=Photo" alt="Student Photo">
                    </div>
                    <span class="upload-hint">Upload Photo</span>
                    <input type="file" id="photoUpload" name="studentPhoto" accept="image/*" style="display: none;" onchange="previewImage(this)">
                </div>
            </div>

            <div class="section-title">Personal Details</div>
            <div class="grid-input">
                <div><label>First Name</label><input type="text" name="fname" required></div>
                <div><label>Last Name</label><input type="text" name="lname" required></div>
            </div>
            <div class="grid-input">
                <div><label>Father's Name</label><input type="text" name="father" required></div>
                <div><label>Mother's Name</label><input type="text" name="mother" required></div>
            </div>
            <div class="grid-input">
                <div><label>Date of Birth</label><input type="date" name="dob" required></div>
                <div><label>Class</label>
                    <select name="class" required>
                        <option value="">Select</option>
                        <option>9th</option><option>10th</option><option>11th</option><option>12th</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Contact & ID</div>
            <div class="grid-input">
                <div><label>SSSM ID</label><input type="number" name="sssm" required></div>
                <div><label>Aadhar Number</label><input type="number" name="aadhar" required></div>
            </div>
            <div style="margin-top: 10px;">
                <label>Mobile Number</label>
                <input type="tel" name="mobile" required>
            </div>

            <button type="submit" class="submit-btn">Save & Proceed</button>
        </form>
    </div>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoPreview').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
