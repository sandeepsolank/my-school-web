<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form - Govt HSS Alot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-container { max-width: 750px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        label { font-weight: bold; color: #003366; font-size: 14px; }
        .section-title { background: #f0f4f8; padding: 10px; margin: 20px 0 10px 0; color: #003366; border-left: 5px solid #003366; font-weight: bold; }
        
        /* Photo Box Styling */
        .photo-upload-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: -40px; /* फॉर्म के साथ एडजस्ट करने के लिए */
        }
        .photo-box {
            text-align: center;
            border: 2px dashed #003366;
            padding: 5px;
            border-radius: 10px;
            width: 120px;
            background: #fafafa;
            cursor: pointer;
        }
        #photoPreview {
            width: 110px;
            height: 140px;
            object-fit: cover;
            border-radius: 5px;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body style="background: #f4f7f6; font-family: 'Arial', sans-serif;">

    <div class="form-container">
        <h2 style="text-align: center; color: #003366; margin-bottom: 30px;">New Admission Form 2026-27</h2>

        <form action="/payment-gate" method="POST" enctype="multipart/form-data">
            
            <div class="photo-upload-container">
                <div class="photo-box" onclick="document.getElementById('photoUpload').click();">
                    <img id="photoPreview" src="https://via.placeholder.com/110x140?text=Upload+Photo" alt="Student Photo">
                    <span style="font-size: 10px; color: #003366; font-weight: bold;">CLICK TO UPLOAD</span>
                    <input type="file" id="photoUpload" name="studentPhoto" accept="image/*" style="display: none;" onchange="previewImage(this)">
                </div>
            </div>

            <div class="section-title">Personal Information</div>
            <div class="grid-input">
                <div><label>First Name</label><input type="text" name="fname" required></div>
                <div><label>Last Name</label><input type="text" name="lname" required></div>
            </div>
            <div class="grid-input">
                <div><label>Father's Name</label><input type="text" name="father" required></div>
                <div><label>Mother's Name</label><input type="text" name="mother" required></div>
            </div>
            <div class="grid-input">
                <div><label>Date of Birth</label><input type="date" name="dob" required></div>
                <div><label>Admission for Class</label>
                    <select name="class" required>
                        <option value="">Select Class</option>
                        <option>9th</option>
                        <option>10th</option>
                        <option>11th</option>
                        <option>12th</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Identity & Contact Details</div>
            <div class="grid-input">
                <div><label>SSSM ID</label><input type="number" name="sssm" required></div>
                <div><label>Aadhar Card Number</label><input type="number" name="aadhar" required></div>
            </div>
            <div class="grid-input">
                <div><label>Mobile Number</label><input type="tel" name="mobile" required></div>
                <div><label>Email ID</label><input type="email" name="email"></div>
            </div>
            <div style="margin-top: 10px;">
                <label>Full Address</label>
                <textarea name="address" rows="3" required placeholder="अपना पूरा पता यहाँ लिखें..."></textarea>
            </div>

            <button type="submit" class="submit-btn" style="width: 100%; margin-top: 30px; background: #28a745; height: 50px; font-size: 18px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
                Save & Proceed to Payment
            </button>
        </form>
    </div>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoPreview').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>

</body>
</html>
