<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form - Govt HSS Alot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #f4f7f6; font-family: 'Arial', sans-serif; padding: 15px; margin: 0; }
        .form-container { 
            max-width: 750px; 
            margin: 20px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: relative; 
        }
        
        /* 🔴 CENTERED TITLE AREA */
        .form-header-center {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 5px;
        }
        .form-header-center h2 { 
            color: #003366; 
            margin: 0; 
            font-size: 24px;
        }
        .form-header-center p { 
            color: #666; 
            margin: 5px 0 0 0; 
            font-size: 14px; 
        }

        /* 🟡 SMALL PHOTO BOX (TOP RIGHT) */
        .photo-upload-right {
            position: absolute;
            top: 20px;
            right: 25px;
            text-align: center;
        }
        .photo-box {
            width: 85px;  /* चौड़ाई और कम कर दी (Small Passport Size) */
            height: 110px; /* हाइट भी उसी अनुपात में कम की */
            border: 1.5px solid #003366;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
        }
        #photoPreview { width: 100%; height: 100%; object-fit: cover; }
        .upload-hint { font-size: 8px; font-weight: bold; color: #003366; margin-top: 3px; display: block; }

        /* Form Content */
        .section-title { background: #003366; padding: 8px 12px; margin: 20px 0 15px 0; color: white; font-weight: bold; font-size: 14px; border-radius: 3px; }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        label { font-size: 12.5px; font-weight: bold; color: #333; margin-bottom: 4px; display: block; }
        input, select { width: 100%; padding: 9px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .submit-btn { width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        @media (max-width: 600px) {
            .photo-upload-right { position: static; margin: 0 auto 15px auto; }
            .grid-input { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <form action="/payment-gate" method="POST" enctype="multipart/form-data">
            
            <div class="photo-upload-right">
                <div class="photo-box" onclick="document.getElementById('photoUpload').click();">
                    <img id="photoPreview" src="https://via.placeholder.com/85x110?text=Photo" alt="Student Photo">
                </div>
                <span class="upload-hint">UPLOAD PHOTO</span>
                <input type="file" id="photoUpload" name="studentPhoto" accept="image/*" style="display: none;" onchange="previewImage(this)">
            </div>

            <div class="form-header-center">
                <h2>New Admission Form</h2>
                <p>Govt HSS Alot | 2026-27</p>
            </div>

            <div class="section-title">Personal Details</div>
            <div class="grid-input">
                <div><label>First Name</label><input type="text" name="fname" required></div>
                <div><label>Last Name</label><input type="text" name="lname" required></div>
            </div>
            <div class="grid-input">
                <div><label>Father's Name</label><input type="text" name="father" required></div>
                <div><label>Mother's Name</label><input type="text" name="mother" required></div>
            </div>
            <div class="grid-input">
                <div><label>Date of Birth</label><input type="date" name="dob" required></div>
                <div><label>Class</label>
                    <select name="class" required>
                        <option value="">Select</option>
                        <option>9th</option><option>10th</option><option>11th</option><option>12th</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Contact & ID</div>
            <div class="grid-input">
                <div><label>SSSM ID</label><input type="number" name="sssm" required></div>
                <div><label>Aadhar Number</label><input type="number" name="aadhar" required></div>
            </div>

            <button type="submit" class="submit-btn">Save & Proceed</button>
        </form>
    </div>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoPreview').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
